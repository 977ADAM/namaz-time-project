<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Namaz Time API</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <div class="hero-copy">
          <p class="eyebrow">Prayer Times API</p>
          <h1>Fast namaz times for any coordinates.</h1>
          <p class="subtitle">
            Production-lite interface on top of the FastAPI backend. Enter coordinates, pick a
            date, and get the six core prayer times instantly.
          </p>
        </div>
        <div class="card">
          <form id="prayer-form" class="form">
            <label>
              <span>Latitude</span>
              <input name="latitude" type="number" step="0.0001" value="55.7558" required />
            </label>
            <label>
              <span>Longitude</span>
              <input name="longitude" type="number" step="0.0001" value="37.6173" required />
            </label>
            <label>
              <span>Date</span>
              <input id="date-input" name="date" type="date" required />
            </label>
            <label>
              <span>Method</span>
              <select name="method">
                <option value="2" selected>ISNA (2)</option>
                <option value="3">MWL (3)</option>
                <option value="4">Umm al-Qura (4)</option>
                <option value="5">Egyptian (5)</option>
              </select>
            </label>
            <label>
              <span>School</span>
              <select name="school">
                <option value="0" selected>Standard</option>
                <option value="1">Hanafi</option>
              </select>
            </label>
            <button type="submit">Get prayer times</button>
          </form>
        </div>
      </section>

      <section class="results">
        <div class="results-header">
          <div>
            <p class="eyebrow">Result</p>
            <h2 id="result-title">Waiting for request</h2>
          </div>
          <p id="result-meta" class="result-meta">Submit the form to load timings.</p>
        </div>
        <div id="status" class="status">Ready.</div>
        <div id="timings" class="grid" aria-live="polite"></div>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
